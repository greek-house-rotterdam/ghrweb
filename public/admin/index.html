<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHR Admin</title>
  </head>
  <body>
    <script>
      // Fallback: if window.opener is blocked by COOP headers in the future,
      // the callback page also sends the token via BroadcastChannel.
      // This listener relays it as a window message that Decap CMS recognizes.
      var channel = new BroadcastChannel("decap-cms-auth");
      channel.addEventListener("message", function (event) {
        if (typeof event.data === "string" && event.data.indexOf("authorization:") === 0) {
          window.postMessage(event.data, window.location.origin);
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
