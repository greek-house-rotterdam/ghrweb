<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GHR Admin</title>
  </head>
  <body>
    <script>
      // Relay auth messages from the OAuth popup to Decap CMS.
      // Multiple methods are used because browser security policies
      // (COOP) can block window.opener after cross-origin redirects.
      function relayAuth(data) {
        document.title = "AUTH: " + (typeof data === "string" ? data.substring(0, 50) : "non-string");
        if (typeof data === "string" && data.indexOf("authorization:") === 0) {
          window.postMessage(data, window.location.origin);
        }
      }

      // Method 2: BroadcastChannel
      var channel = new BroadcastChannel("decap-cms-auth");
      channel.addEventListener("message", function (event) {
        relayAuth(event.data);
      });

      // Method 3: localStorage "storage" event (fires in other tabs on change)
      window.addEventListener("storage", function (event) {
        if (event.key === "decap-cms-auth" && event.newValue) {
          relayAuth(event.newValue);
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
