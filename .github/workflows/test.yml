name: Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - "src/**/*.ts"
      - "src/**/*.astro"
      - "src/**/*.js"
      - "src/**/*.mjs"
      - "public/admin/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "tsconfig.json"
      - ".github/scripts/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/test.yml"

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv export --no-hashes | uv pip install --system -r - && pip install pytest Pillow requests

      - name: Run Python tests
        run: pytest -v
