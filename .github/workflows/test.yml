name: Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - "src/**/*.ts"
      - "src/**/*.astro"
      - "src/**/*.js"
      - "src/**/*.mjs"
      - "public/admin/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "tsconfig.json"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
