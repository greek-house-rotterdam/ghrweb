name: Translate Content

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]
    paths:
      - "src/content/**/*.md"

permissions:
  contents: write
  statuses: write

jobs:
  translate:
    # Skip draft PRs from Decap CMS — only run when editor moves to "In Review"
    if: "!contains(github.event.pull_request.labels.*.name, 'decap-cms/draft')"
    runs-on: ubuntu-latest
    outputs:
      new_sha: ${{ steps.push-translations.outputs.new_sha }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv export --no-hashes | uv pip install --system -r -

      - name: Detect and translate changed content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git fetch origin main
          git config core.quotePath false

          echo "=== Added/Changed files ==="
          git diff --name-only --diff-filter=ACM origin/main...HEAD -- 'src/content/' > /tmp/changed.txt
          cat /tmp/changed.txt

          if [ -s /tmp/changed.txt ]; then
            echo "Translating..."
            xargs -d '\n' python .github/scripts/translate.py < /tmp/changed.txt
          else
            echo "No content files to translate."
          fi

          echo ""
          echo "=== Deleted files ==="
          git diff --name-only --diff-filter=D origin/main...HEAD -- 'src/content/' > /tmp/deleted.txt
          cat /tmp/deleted.txt

          if [ -s /tmp/deleted.txt ]; then
            echo "Syncing deletions..."
            xargs -d '\n' python .github/scripts/sync_deletions.py < /tmp/deleted.txt
          else
            echo "No content files deleted."
          fi

      - name: Commit and push translations
        id: push-translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "new_sha=" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-translate and sync content"
            git push
            echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: translate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin ${{ github.head_ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify content integrity
        run: python .github/scripts/verify_content.py

      - name: Report status on auto-commit
        if: ${{ needs.translate.outputs.new_sha != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NEW_SHA: ${{ needs.translate.outputs.new_sha }}
        run: |
          # 'translate' and 'verify' ran in *this* workflow and produced NEW_SHA,
          # so posting success on the bot's commit reflects what actually happened.
          for context in translate verify; do
            gh api "repos/$REPO/statuses/$NEW_SHA" \
              -f state=success \
              -f context="$context" \
              -f description="Passed (via auto-translation workflow)"
          done

          # GitHub's GITHUB_TOKEN recursion prevention blocks Content Review from
          # re-triggering on the bot's commit. Carry forward the conclusion from
          # the parent (human-authored) commit instead of synthesizing success.
          PARENT_SHA=$(gh api "repos/$REPO/commits/$NEW_SHA" --jq '.parents[0].sha')

          # Content Review runs in parallel with this workflow — poll briefly.
          for attempt in 1 2 3 4 5 6; do
            REVIEW_CONCLUSION=$(gh api "repos/$REPO/commits/$PARENT_SHA/check-runs" \
              --jq '[.check_runs[] | select(.name=="review")] | .[0].conclusion // empty')
            if [ -n "$REVIEW_CONCLUSION" ]; then
              break
            fi
            echo "Review check not yet concluded on $PARENT_SHA (attempt $attempt) — waiting 10s..."
            sleep 10
          done

          case "$REVIEW_CONCLUSION" in
            success|neutral|skipped)            STATE=success ;;
            failure|timed_out|action_required)  STATE=failure ;;
            cancelled)                          STATE=error ;;
            "")
              echo "No 'review' check found on $PARENT_SHA — skipping carry-forward."
              exit 0
              ;;
            *) STATE=success ;;
          esac

          gh api "repos/$REPO/statuses/$NEW_SHA" \
            -f state="$STATE" \
            -f context=review \
            -f description="Carried forward from ${PARENT_SHA:0:7} (translations not separately reviewed)"
